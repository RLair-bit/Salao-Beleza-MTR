{% extends "base.html" %}
{% block titulo %}Eliminar funcionário{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header fw-bold">
                Eliminar funcionário
            </div>

            <div class="card-body">
                <p>
                    Tens a certeza de que queres eliminar
                    <b>{{ funcionario.nome }}</b>?
                </p>

                <form method="post">
                    {% csrf_token %}

                    <button class="btn btn-danger">
                        Sim, eliminar
                    </button>

                    <a class="btn btn-outline-dark"
                       href="{% url 'funcionarios:lista' %}">
                        Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
