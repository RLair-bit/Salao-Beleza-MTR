{% extends "base.html" %}

{% block titulo %}Configurações{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h1 class="h3 mb-4"><i class="bi bi-gear"></i> Configurações do salão</h1>

    <div class="card border border-2 border-dark">
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {% for campo in form %}
            <div class="mb-3">
              <label for="{{ campo.id_for_label }}" class="form-label fw-bold">{{ campo.label }}</label>
              {{ campo }}
              {% if campo.errors %}<div class="text-danger small mt-1">{{ campo.errors|striptags }}</div>{% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Guardar
          </button>
          <a href="{% url 'home' %}" class="btn btn-outline-dark">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
