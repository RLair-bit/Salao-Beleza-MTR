{% extends "base.html" %}
{% load i18n %}

{% block titulo %}{{ titulo }}{% endblock %}

{% block conteudo %}

<div class="row justify-content-center">
    <div class="col-lg-7">
        <h1>{{ titulo }}</h1>
        <div class="card">
            <div class="card-header fw-bold">{{ titulo }}</div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% for campo in form %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ campo.id_for_label }}">{{ campo.label }}</label>
                        {{ campo }}
                        {% for erro in campo.errors %}
                        <div class="text-danger small mt-1">{{ erro }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}
                    <button class="btn btn-primary">
                        <i class="bi bi-floppy"></i>
                        &nbsp;{% trans "Salvar" %}
                    </button>
                    <a class="btn btn-outline-dark" href="{% url 'clientes:listar' %}">
                        <i class="bi bi-x-lg"></i>
                        &nbsp;{% trans "Cancelar" %}
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
